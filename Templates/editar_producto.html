<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-4">

    <h3 class="mb-4">Editar producto: {{ producto[1] }}</h3>

    <form method="POST">

        <div class="mb-3">
            <label class="form-label">Cantidad (decimal)</label>
            <input type="number" step="0.01" name="cantidad" class="form-control" value="{{ producto[2] }}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Precio</label>
            <input type="number" step="0.01" name="precio" class="form-control" value="{{ producto[3] }}" required>
        </div>

        <button class="btn btn-primary">Guardar cambios</button>
        <a href="/" class="btn btn-secondary">Cancelar</a>

    </form>

</body>
</html>
